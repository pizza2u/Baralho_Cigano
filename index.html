<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Cigano</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1e;
    --crimson: #8b1a1a;
    --deep: #0a0608;
    --card-bg: #1a0f0a;
    --card-border: #6b4c1e;
    --smoke: rgba(201,168,76,0.08);
    --text: #e8d5a3;
    --text-dim: #9e8a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* STARS BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 70%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 75%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 85%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 60%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 50%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 42%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 10%, rgba(201,168,76,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* SMOKE WISPS */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(139,26,26,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 30%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 80% 30% at 50% 100%, rgba(139,26,26,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 32px 0 20px;
  }

  .ornament {
    color: var(--gold);
    font-size: 1.2em;
    letter-spacing: 0.3em;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    margin: 8px 0;
  }

  .subtitle {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 4px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
    opacity: 0.6;
  }

  /* SCREEN: QUESTION */
  #screen-apikey, #screen-question, #screen-spread, #screen-reading {
    display: none;
    animation: fadeIn 0.6s ease;
  }
  #screen-apikey.active, #screen-question.active, #screen-spread.active, #screen-reading.active {
    display: block;
  }

  /* API KEY SCREEN */
  .apikey-box {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 32px 28px;
    max-width: 480px;
    margin: 0 auto;
  }

  .apikey-box p {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .apikey-box a {
    color: var(--gold);
    text-decoration: none;
  }

  .apikey-box a:hover { text-decoration: underline; }

  .key-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .key-input-wrap input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    padding: 12px 44px 12px 14px;
    transition: border-color 0.3s;
    letter-spacing: 0.04em;
  }

  .key-input-wrap input:focus {
    outline: none;
    border-color: rgba(201,168,76,0.5);
  }

  .key-input-wrap input::placeholder { color: var(--text-dim); font-style: italic; }

  .toggle-key {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
  }

  .toggle-key:hover { color: var(--gold); }

  .key-note {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .api-key-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-style: italic;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 4px;
    transition: background 0.2s;
    float: right;
  }

  .api-key-indicator:hover { background: rgba(201,168,76,0.06); color: var(--gold); }

  .dot-status {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .dot-status.active { background: #5c9e5c; box-shadow: 0 0 6px rgba(92,158,92,0.5); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SPREAD SELECTION */
  .spread-intro {
    text-align: center;
    font-style: italic;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-size: 1rem;
    line-height: 1.6;
  }

  .spread-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .spread-btn {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    color: var(--text);
    font-family: 'IM Fell English', serif;
  }

  .spread-btn:hover {
    border-color: var(--gold);
    background: linear-gradient(135deg, #2a1a0a, #1a0f05);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
    transform: translateY(-2px);
  }

  .spread-btn .spread-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.85rem;
    color: var(--gold-light);
    margin-bottom: 6px;
  }

  .spread-btn .spread-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.4;
  }

  .spread-btn .spread-icon {
    font-size: 1.8rem;
    margin-bottom: 10px;
    display: block;
  }

  /* QUESTION INPUT */
  .question-box {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .question-box label {
    display: block;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    padding: 14px;
    resize: none;
    height: 90px;
    transition: border-color 0.3s;
    line-height: 1.5;
  }

  textarea:focus {
    outline: none;
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 15px rgba(201,168,76,0.08);
  }

  textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .btn-primary {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    border: none;
    border-radius: 6px;
    color: #0a0608;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    box-shadow: 0 0 25px rgba(201,168,76,0.3);
    transform: translateY(-1px);
  }

  /* CARD DECK AREA */
  .deck-area {
    text-align: center;
    margin: 20px 0 30px;
  }

  .deck-instruction {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  .slots-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .card-slot {
    width: 90px;
    height: 130px;
    border: 2px dashed rgba(201,168,76,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    transition: all 0.3s;
  }

  .card-slot.filled {
    border: 2px solid rgba(201,168,76,0.5);
    cursor: pointer;
  }

  .card-slot.filled:hover {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
    transform: translateY(-3px);
  }

  .slot-label {
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-top: 6px;
    text-align: center;
    font-style: italic;
    line-height: 1.3;
  }

  .slot-number {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.55rem;
    color: rgba(201,168,76,0.4);
    margin-bottom: 4px;
  }

  /* PLAYING CARD */
  .playing-card {
    width: 86px;
    height: 126px;
    border-radius: 7px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .card-face {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #1f1108, #0d0703);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 4px;
    text-align: center;
  }

  .card-symbol {
    font-size: 1.6rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.48rem;
    color: var(--gold);
    letter-spacing: 0.03em;
    line-height: 1.3;
  }

  .card-back {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #1a0d08, #0d0703);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    position: relative;
    overflow: hidden;
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    background:
      repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(201,168,76,0.03) 4px, rgba(201,168,76,0.03) 5px),
      repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(201,168,76,0.03) 4px, rgba(201,168,76,0.03) 5px);
  }

  /* CARD PILE */
  .card-pile {
    position: relative;
    width: 90px;
    height: 130px;
    margin: 0 auto 8px;
    cursor: pointer;
  }

  .pile-layer {
    position: absolute;
    width: 86px;
    height: 126px;
    border-radius: 7px;
    background: linear-gradient(145deg, #1a0d08, #0d0703);
    border: 1px solid var(--card-border);
    transition: all 0.3s;
  }

  .pile-layer:nth-child(3) { top: 0px; left: 2px; }
  .pile-layer:nth-child(2) { top: -2px; left: 1px; }
  .pile-layer:nth-child(1) { top: -4px; left: 0px; background: linear-gradient(145deg, #2a1a0a, #1a0f05); }

  .pile-layer:nth-child(1)::before {
    content: '🔮';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .pile-layer:nth-child(1)::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
  }

  .card-pile:hover .pile-layer:nth-child(1) {
    box-shadow: 0 0 25px rgba(201,168,76,0.25);
    transform: translateY(-3px);
  }

  /* READING AREA */
  .reading-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .reading-header .question-display {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  .cards-revealed {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
  }

  .revealed-card {
    width: 120px;
    text-align: center;
    animation: cardReveal 0.5s ease forwards;
    opacity: 0;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px) rotateY(90deg); }
    to { opacity: 1; transform: translateY(0) rotateY(0); }
  }

  .revealed-card .big-card {
    width: 120px;
    height: 175px;
    background: linear-gradient(155deg, #2a1808, #0f0804);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.1);
    position: relative;
    overflow: hidden;
    padding: 10px 6px;
  }

  .revealed-card .big-card::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 6px;
  }

  .revealed-card .big-symbol {
    font-size: 2.8rem;
    margin-bottom: 6px;
    line-height: 1;
    z-index: 1;
  }

  .revealed-card .big-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.58rem;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.4;
    z-index: 1;
  }

  .revealed-card .card-position {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-style: italic;
  }

  /* INTERPRETATION */
  .interpretation {
    background: linear-gradient(135deg, #1a100a, #0d0806);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .interpretation::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--gold-dark), var(--gold), var(--gold-dark));
  }

  .interpretation h3 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    padding-left: 14px;
  }

  .interpretation-text {
    font-size: 0.97rem;
    line-height: 1.8;
    color: var(--text);
    font-style: italic;
    padding-left: 14px;
  }

  .interpretation-text p { margin-bottom: 14px; }
  .interpretation-text p:last-child { margin-bottom: 0; }

  .loading-text {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
    padding-left: 14px;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  .btn-secondary {
    display: inline-block;
    background: transparent;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.3s;
    font-style: italic;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    box-shadow: 0 0 15px rgba(201,168,76,0.1);
  }

  .actions { text-align: center; margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* CARD KEYWORD PILLS */
  .card-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 14px 0 0;
    padding-left: 14px;
  }

  .keyword-pill {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.73rem;
    color: var(--gold);
    font-style: italic;
  }

  /* GLOW pulse on pile */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(201,168,76,0.1); }
    50% { box-shadow: 0 0 30px rgba(201,168,76,0.3); }
  }

  .card-pile { animation: glow-pulse 3s ease infinite; }

  /* responsive */
  @media(max-width: 500px) {
    .revealed-card { width: 100px; }
    .revealed-card .big-card { width: 100px; height: 146px; }
    .revealed-card .big-symbol { font-size: 2.2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="ornament">✦ ✦ ✦</div>
    <h1>Baralho Cigano</h1>
    <p class="subtitle">As cartas falam — os astros guiam</p>
    <div class="divider"></div>
  </header>

  <!-- SCREEN 1: CHOOSE SPREAD -->
  <div id="screen-question" class="active">
    <div style="text-align:right;margin-bottom:4px;">
      <span class="api-key-indicator" onclick="showScreen('screen-apikey')" title="Alterar chave">
        <span class="dot-status" id="key-dot"></span>
        <span id="key-label">chave não configurada</span>
      </span>
    </div>
    <p class="spread-intro">Escolha o tipo de tiragem que deseja fazer esta vez</p>
    <div class="spread-options">
      <button class="spread-btn" onclick="selectSpread(1, 'Carta do Momento', ['O Presente'])">
        <span class="spread-icon">🕯️</span>
        <div class="spread-name">Carta do Momento</div>
        <div class="spread-desc">Uma carta que revela a energia do momento atual</div>
      </button>
      <button class="spread-btn" onclick="selectSpread(3, 'Passado, Presente e Futuro', ['O Passado','O Presente','O Futuro'])">
        <span class="spread-icon">⏳</span>
        <div class="spread-name">Passado · Presente · Futuro</div>
        <div class="spread-desc">Três cartas que revelam a jornada do tempo</div>
      </button>
      <button class="spread-btn" onclick="selectSpread(5, 'Cruz Cigana', ['Situação','Desafio','Passado','Futuro','Desfecho'])">
        <span class="spread-icon">✡️</span>
        <div class="spread-name">Cruz Cigana</div>
        <div class="spread-desc">Cinco cartas para uma visão profunda da questão</div>
      </button>
    </div>
  </div>

  <!-- SCREEN 2: DRAW CARDS -->
  <div id="screen-spread">
    <div class="question-box">
      <label>✦ FORMULE SUA PERGUNTA OU INTENÇÃO</label>
      <textarea id="question-input" placeholder="Escreva sua pergunta, ou deixe em branco para uma leitura geral sobre sua vida..." maxlength="300"></textarea>
    </div>

    <div class="deck-area">
      <p class="deck-instruction" id="draw-instruction">Concentre-se em sua pergunta e clique no baralho para revelar as cartas</p>
      <div class="slots-area" id="slots-area"></div>
      <div class="card-pile" id="card-pile" onclick="drawCard()">
        <div class="pile-layer"></div>
        <div class="pile-layer"></div>
        <div class="pile-layer"></div>

let currentSpread = null;
let spreadPositions = [];
let drawnCards = [];
let remaining = [];

function selectSpread(count, name, positions) {
  currentSpread = { count, name };
  spreadPositions = positions;
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);

  showScreen('screen-spread');
  renderSlots();
  updatePileCounter();
}

function renderSlots() {
  const area = document.getElementById('slots-area');
  area.innerHTML = '';
  for (let i = 0; i < currentSpread.count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `
      <div class="slot-number">${i+1}</div>
      <div class="slot-label">${spreadPositions[i]}</div>
    `;
    area.appendChild(slot);
  }
}

function updatePileCounter() {
  const needed = currentSpread.count - drawnCards.length;
  const el = document.getElementById('pile-counter');
  if (needed <= 0) el.textContent = '';
  else el.textContent = `${drawnCards.length} de ${currentSpread.count} carta${currentSpread.count > 1 ? 's' : ''} revelada${drawnCards.length !== 1 ? 's' : ''}`;
}

function drawCard() {
  if (drawnCards.length >= currentSpread.count) return;
  const card = remaining.pop();
  const idx = drawnCards.length;
  drawnCards.push(card);

  const slot = document.getElementById(`slot-${idx}`);
  slot.className = 'card-slot filled';
  slot.innerHTML = `
    <div class="playing-card">
      <div class="card-face">
        <div class="card-symbol">${card.symbol}</div>
        <div class="card-name">${card.name}</div>
      </div>
    </div>
    <div class="slot-label">${spreadPositions[idx]}</div>
  `;

  updatePileCounter();

  if (drawnCards.length === currentSpread.count) {
    document.getElementById('card-pile').style.opacity = '0.3';
    document.getElementById('card-pile').style.pointerEvents = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
    document.getElementById('draw-instruction').textContent = 'Todas as cartas foram escolhidas. Clique em Revelar.';
  }
}

function goToReading() {
  const question = document.getElementById('question-input').value.trim();
  showScreen('screen-reading');

  document.getElementById('spread-name-display').textContent = `✦ ${currentSpread.name} ✦`;
  document.getElementById('question-display').textContent = question
    ? `"${question}"`
    : 'Leitura geral — a mensagem do momento';

  const revealArea = document.getElementById('cards-revealed');
  revealArea.innerHTML = '';
  drawnCards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'revealed-card';
    el.style.animationDelay = `${i * 0.18}s`;
    el.innerHTML = `
      <div class="big-card">
        <div class="big-symbol">${card.symbol}</div>
        <div class="big-name">${card.name}</div>
      </div>
      <div class="card-position">${spreadPositions[i]}</div>
    `;
    revealArea.appendChild(el);
  });

  callClaude(question);
}

// Frases de abertura variadas
const ABERTURAS = [
  "As cartas se dispõem diante de você e revelam",
  "O baralho fala com clareza nesta tiragem",
  "Os mistérios se desfazem carta a carta",
  "A leitura traz uma mensagem precisa",
  "O destino mostra seu rosto nesta tiragem"
];

// Frases de transição
const TRANSICOES = [
  "Avançando na leitura,",
  "As cartas seguintes acrescentam:",
  "O fio invisível que une as cartas revela ainda",
  "Há mais a ser dito —",
  "A mensagem se aprofunda:"
];

// Frases de encerramento
const ENCERRAMENTOS = [
  "As cartas sussurram que o momento pede atenção e intenção. Confie no que veio à tona.",
  "Que esta leitura ilumine seu caminho. O que as cartas revelam, só você pode transformar.",

  "As cartas mostraram o que está em movimento. O que fazer com isso está em suas mãos."
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateLocalReading(question) {
  const cards = drawnCards;
  const positions = spreadPositions;
  const n = cards.length;

  // Determina tom geral (positivo, misto, desafiador) baseado nas cartas
  const positiveIds = new Set([2,4,5,9,12,13,15,16,17,18,20,24,25,30,31,33,34,35]);
  const challengingIds = new Set([6,7,8,10,11,21,23,36]);
  let posCount = cards.filter(c => positiveIds.has(c.id)).length;
  let chalCount = cards.filter(c => challengingIds.has(c.id)).length;
  const tone = posCount >= chalCount ? 'pos' : 'neg';

  const paragraphs = [];

  // ── PARÁGRAFO 1: contexto / carta principal ──────────────────────────────
  const c0 = cards[0];
  const m0 = CARD_MEANINGS[c0.id];
  let p1 = `${pick(ABERTURAS)}: ${m0[tone]}`;
  if (question) p1 += ` Em relação à sua pergunta sobre "${question}", esta é a energia central que permeia a situação.`;
  paragraphs.push(p1);

  // ── PARÁGRAFO 2: cartas do meio / desenvolvimento ────────────────────────
  if (n === 1) {
    // carta única: aprofunda
    const kws = c0.keywords.slice(0, 3).join(', ');
    paragraphs.push(`${c0.name} carrega as energias de ${kws}. Reflita sobre como essas forças aparecem na sua vida agora — às vezes uma única carta diz mais do que um volume inteiro de palavras.`);
  } else if (n === 3) {
    const c1 = cards[1]; const m1 = CARD_MEANINGS[c1.id];
    const c2 = cards[2]; const m2 = CARD_MEANINGS[c2.id];
    paragraphs.push(`${pick(TRANSICOES)} o presente, representado por ${c1.name}, revela que ${m1[tone].toLowerCase()} Já o futuro, guardado por ${c2.name}, aponta para ${m2[tone].toLowerCase()}`);
  } else if (n >= 5) {
    const mid = cards.slice(1, 4);
    const midText = mid.map((c, i) => {
      const m = CARD_MEANINGS[c.id];
      return `${c.name} (${positions[i+1].toLowerCase()}) indica ${m[tone].toLowerCase()}`;
    }).join('; ');
    paragraphs.push(`${pick(TRANSICOES)} ${midText}.`);
  }

  // ── PARÁGRAFO 3: síntese e encerramento ──────────────────────────────────
  if (n >= 3) {
    const last = cards[n-1];
    const mLast = CARD_MEANINGS[last.id];
    paragraphs.push(`Por fim, ${last.name} como ${positions[n-1].toLowerCase()} entrega a mensagem derradeira: ${mLast[tone].toLowerCase()} ${pick(ENCERRAMENTOS)}`);
  } else {
    paragraphs.push(pick(ENCERRAMENTOS));
  }

  return paragraphs.join('\n\n');
}

function callClaude(question) {
  // Pequeno delay para dar sensação de "consulta"
  setTimeout(() => {
    const text = generateLocalReading(question);
    const box = document.getElementById('interpretation-box');
    box.innerHTML = `
      <h3>✦ A LEITURA DAS CARTAS</h3>
      <div class="interpretation-text">${text.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>
      <div class="card-keywords">${drawnCards.flatMap(c => c.keywords).slice(0, 8).map(k => `<span class="keyword-pill">${k}</span>`).join('')}</div>
    `;
  }, 1800);
}

function showScreen(id) {
  document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetAll() {
  drawnCards = [];
  currentSpread = null;
  document.getElementById('question-input').value = '';
  showScreen('screen-question');
}

function changeQuestion() {
  document.getElementById('question-input').value = '';
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);
  document.getElementById('card-pile').style.opacity = '1';
  document.getElementById('card-pile').style.pointerEvents = 'auto';
  document.getElementById('reveal-btn').style.display = 'none';
  renderSlots();
  updatePileCounter();
  document.getElementById('draw-instruction').textContent = 'Concentre-se em sua pergunta e clique no baralho para revelar as cartas';
  showScreen('screen-spread');
}

// Start
showScreen('screen-question');
</script>
