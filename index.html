<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Cigano</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1e;
    --crimson: #8b1a1a;
    --deep: #0a0608;
    --card-bg: #1a0f0a;
    --card-border: #6b4c1e;
    --smoke: rgba(201,168,76,0.08);
    --text: #e8d5a3;
    --text-dim: #9e8a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  /* Estrelas e Fumaça (Mantidos do seu original) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%), radial-gradient(1px 1px at 55% 75%, rgba(201,168,76,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  header { text-align: center; padding: 32px 0 20px; }
  h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(1.4rem, 5vw, 2.4rem); color: var(--gold-light); }

  /* Telas */
  .screen { display: none; animation: fadeIn 0.6s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Grid de Opções */
  .spread-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .spread-btn {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    color: var(--text);
    transition: 0.3s;
  }

  .spread-btn:active { transform: scale(0.98); background: #2a1a0a; }

  /* Slots e Cartas */
  .slots-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
  }

  .card-slot {
    width: 90px;
    height: 130px;
    border: 2px dashed rgba(201,168,76,0.25);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .playing-card {
    width: 84px;
    height: 124px;
    background: linear-gradient(145deg, #1f1108, #0d0703);
    border: 1px solid var(--gold);
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: cardReveal 0.4s ease-out;
  }

  .card-pile {
    width: 90px;
    height: 130px;
    margin: 20px auto;
    position: relative;
    cursor: pointer;
    animation: glow-pulse 3s infinite;
  }

  .pile-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #2a1a0a, #1a0f05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
  }

  .pile-layer::after { content: '🔮'; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 2rem; }

  /* Interpretação */
  .interpretation {
    background: rgba(26, 16, 10, 0.9);
    border-left: 3px solid var(--gold);
    padding: 20px;
    margin-top: 20px;
    border-radius: 0 8px 8px 0;
  }

  .keyword-pill {
    display: inline-block;
    background: rgba(201,168,76,0.1);
    padding: 4px 10px;
    border-radius: 15px;
    font-size: 0.75rem;
    margin: 4px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--gold-dark);
    border: none;
    color: black;
    font-family: 'Cinzel Decorative';
    border-radius: 5px;
    margin-top: 20px;
  }

  @keyframes glow-pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 20px var(--gold-dark); } }
  @keyframes cardReveal { from { transform: scale(0.5) rotateY(90deg); opacity: 0; } to { transform: scale(1) rotateY(0); opacity: 1; } }

  @media(max-width: 500px) {
    .card-slot { width: 75px; height: 110px; }
    .playing-card { width: 70px; height: 105px; }
    .card-symbol { font-size: 1.5rem; }
    .card-name { font-size: 0.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Baralho Cigano</h1>
    <p style="color:var(--text-dim)">As cartas falam — os astros guiam</p>
  </header>

  <div id="screen-question" class="screen active">
    <p style="text-align:center">Escolha sua tiragem:</p>
    <div class="spread-options">
      <button class="spread-btn" onclick="selectSpread(1, 'Carta do Momento', ['O Presente'])">
        <span>🕯️</span><br><b>Carta do Momento</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(3, 'Passado, Presente e Futuro', ['Passado','Presente','Futuro'])">
        <span>⏳</span><br><b>Três Tempos</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(5, 'Cruz Cigana', ['Situação','Desafio','Passado','Futuro','Desfecho'])">
        <span>✡️</span><br><b>Cruz Cigana</b>
      </button>
    </div>
  </div>

  <div id="screen-spread" class="screen">
    <div class="slots-area" id="slots-area"></div>
    <div class="card-pile" id="card-pile" onclick="drawCard()">
      <div class="pile-layer"></div>
    </div>
    <p id="pile-counter" style="text-align:center; font-size:0.8rem; color:var(--text-dim)"></p>
    <button class="btn-primary" id="reveal-btn" style="display:none" onclick="goToReading()">✦ REVELAR LEITURA</button>
  </div>

  <div id="screen-reading" class="screen">
    <h2 id="reading-title" style="text-align:center; color:var(--gold)"></h2>
    <div class="slots-area" id="cards-revealed"></div>
    <div class="interpretation" id="interpretation-box">
      <p>Embaralhando as energias...</p>
    </div>
    <button class="btn-primary" onclick="resetAll()" style="background:transparent; border:1px solid var(--gold); color:var(--gold)">NOVA TIRAGEM</button>
  </div>
</div>

<script>
const CARDS = [
  { id: 1, name: "O Cavaleiro", symbol: "🐴", keywords: ["novidade","mensagem","movimento"] },
  { id: 2, name: "O Trevo", symbol: "🍀", keywords: ["sorte","alegria","oportunidade"] },
  { id: 3, name: "O Navio", symbol: "⛵", keywords: ["viagem","mudança","distância"] },
  { id: 4, name: "A Casa", symbol: "🏠", keywords: ["lar","família","estabilidade"] },
  { id: 5, name: "A Árvore", symbol: "🌳", keywords: ["saúde","crescimento","vitalidade"] },
  { id: 6, name: "As Nuvens", symbol: "☁️", keywords: ["confusão","incerteza","dúvida"] },
  { id: 7, name: "A Serpente", symbol: "🐍", keywords: ["sabedoria","inveja","transformação"] },
  { id: 8, name: "O Caixão", symbol: "⚰️", keywords: ["fim","ciclos","encerramento"] },
  { id: 9, name: "O Buquê", symbol: "💐", keywords: ["felicidade","presente","beleza"] },
  { id: 10, name: "A Foice", symbol: "⚔️", keywords: ["corte","decisão","ruptura"] },
  { id: 24, name: "O Coração", symbol: "❤️", keywords: ["amor","emoção","paixão"] },
  { id: 31, name: "O Sol", symbol: "☀️", keywords: ["sucesso","clareza","alegria"] },
  { id: 33, name: "A Chave", symbol: "🗝️", keywords: ["solução","abertura","resposta"] }
  // Adicione as outras conforme necessário...
];

let currentSpread = null;
let drawnCards = [];
let remaining = [];

function selectSpread(count, name, positions) {
  currentSpread = { count, name, positions };
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);
  
  showScreen('screen-spread');
  renderSlots();
  updatePileCounter();
  
  // Reset do botão e do deck
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('card-pile').style.display = 'block';
}

function renderSlots() {
  const area = document.getElementById('slots-area');
  area.innerHTML = '';
  for (let i = 0; i < currentSpread.count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `<span style="font-size:0.6rem">${currentSpread.positions[i]}</span>`;
    area.appendChild(slot);
  }
}

function drawCard() {
  if (drawnCards.length >= currentSpread.count) return;

  const card = remaining.pop();
  const idx = drawnCards.length;
  drawnCards.push(card);

  const slot = document.getElementById(`slot-${idx}`);
  slot.innerHTML = `
    <div class="playing-card">
      <div class="card-symbol">${card.symbol}</div>
      <div class="card-name" style="font-size:0.6rem; text-align:center">${card.name}</div>
    </div>
  `;

  updatePileCounter();

  if (drawnCards.length === currentSpread.count) {
    document.getElementById('card-pile').style.display = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
  }
}

function updatePileCounter() {
  document.getElementById('pile-counter').textContent = `${drawnCards.length} de ${currentSpread.count} selecionadas`;
}

function goToReading() {
  showScreen('screen-reading');
  document.getElementById('reading-title').textContent = currentSpread.name;
  
  const container = document.getElementById('cards-revealed');
  container.innerHTML = '';
  
  drawnCards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card-slot';
    div.innerHTML = `<div class="playing-card"><span>${card.symbol}</span><br><small>${card.name}</small></div>`;
    container.appendChild(div);
  });

  // Simulação de leitura simplificada para performance mobile
  setTimeout(() => {
    const box = document.getElementById('interpretation-box');
    const keywords = drawnCards.flatMap(c => c.keywords).map(k => `<span class="keyword-pill">${k}</span>`).join('');
    box.innerHTML = `<h3>Sua Mensagem</h3><p>As energias de ${drawnCards[0].name} dominam a leitura. O momento pede foco em: </p><div>${keywords}</div>`;
  }, 1000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0); // Garante que a tela comece do topo no mobile
}

function resetAll() {
  showScreen('screen-question');
}
</script>
</body>
</html>
