<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Cigano</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1e;
    --crimson: #8b1a1a;
    --deep: #0a0608;
    --card-bg: #1a0f0a;
    --card-border: #6b4c1e;
    --smoke: rgba(201,168,76,0.08);
    --text: #e8d5a3;
    --text-dim: #9e8a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation; /* Melhora resposta no mobile */
  }

  /* STARS BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 70%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 75%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 85%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 60%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 50%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 42%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 10%, rgba(201,168,76,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  header { text-align: center; padding: 32px 0 20px; }

  .ornament { color: var(--gold); font-size: 1.2em; letter-spacing: 0.3em; opacity: 0.7; }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    margin: 8px 0;
  }

  .divider { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; opacity: 0.6; }

  /* SCREENS */
  .screen { display: none; animation: fadeIn 0.6s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .spread-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }

  .spread-btn {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    color: var(--text);
    font-family: 'IM Fell English', serif;
  }

  .spread-btn .spread-name { font-family: 'Cinzel Decorative', cursive; font-size: 0.85rem; color: var(--gold-light); margin-bottom: 6px; }

  .card-slot {
    width: 90px; height: 130px; border: 2px dashed rgba(201,168,76,0.25); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative;
  }

  .playing-card {
    width: 86px; height: 126px; border-radius: 7px; position: relative; overflow: hidden;
    background: linear-gradient(145deg, #1f1108, #0d0703); border: 1px solid var(--card-border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .card-pile { position: relative; width: 90px; height: 130px; margin: 0 auto 8px; cursor: pointer; animation: glow-pulse 3s ease infinite; }
  .pile-layer { position: absolute; inset: 0; border-radius: 7px; background: linear-gradient(145deg, #2a1a0a, #1a0f05); border: 1px solid var(--card-border); }
  .pile-layer::before { content: '🔮'; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 1.8rem; }

  .interpretation { background: linear-gradient(135deg, #1a100a, #0d0806); border-left: 3px solid var(--gold); padding: 28px; border-radius: 0 10px 10px 0; margin-bottom: 20px; }
  .interpretation h3 { font-family: 'Cinzel Decorative', cursive; font-size: 0.8rem; color: var(--gold); margin-bottom: 16px; }

  .keyword-pill { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; padding: 3px 10px; font-size: 0.73rem; color: var(--gold); margin: 2px; display: inline-block; }

  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); border: none; border-radius: 6px; color: #000; font-family: 'Cinzel Decorative'; padding: 14px; cursor: pointer; font-weight: bold; }

  @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 10px rgba(201,168,76,0.1); } 50% { box-shadow: 0 0 30px rgba(201,168,76,0.3); } }

  @media(max-width: 500px) {
    .card-slot { width: 80px; height: 116px; }
    .playing-card { width: 76px; height: 112px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="ornament">✦ ✦ ✦</div>
    <h1>Baralho Cigano</h1>
    <p style="color:var(--text-dim); text-align:center;">As cartas falam — os astros guiam</p>
    <div class="divider"></div>
  </header>

  <div id="screen-options" class="screen active">
    <div class="spread-options">
      <button class="spread-btn" onclick="selectSpread(1, 'Carta do Momento', ['O Presente'])">
        <div class="spread-name">Carta do Momento</div>
      </button>
      <button class="spread-btn" onclick="selectSpread(3, 'Passado, Presente e Futuro', ['O Passado','O Presente','O Futuro'])">
        <div class="spread-name">Três Tempos</div>
      </button>
      <button class="spread-btn" onclick="selectSpread(5, 'Cruz Cigana', ['Situação','Desafio','Passado','Futuro','Desfecho'])">
        <div class="spread-name">Cruz Cigana</div>
      </button>
    </div>
  </div>

  <div id="screen-spread" class="screen">
    <div class="slots-area" id="slots-area" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
    <div class="card-pile" id="card-pile" onclick="drawCard()">
      <div class="pile-layer"></div>
    </div>
    <p id="pile-counter" style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--text-dim)"></p>
    <button class="btn-primary" id="reveal-btn" style="display:none; margin-top:20px;" onclick="goToReading()">✦ REVELAR LEITURA</button>
  </div>

  <div id="screen-reading" class="screen">
    <h2 id="reading-title" style="text-align:center; color:var(--gold-light); margin-bottom:20px; font-family:'Cinzel Decorative'"></h2>
    <div id="cards-revealed" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-bottom:30px;"></div>
    <div class="interpretation" id="interpretation-box"></div>
    <button class="btn-primary" onclick="resetAll()" style="background:transparent; border:1px solid var(--gold); color:var(--gold); margin-top:20px;">NOVA TIRAGEM</button>
  </div>
</div>

<script>
const CARDS = [
  { id: 1, name: "O Cavaleiro", symbol: "🐴", keywords: ["novidade","mensagem","movimento"] },
  { id: 2, name: "O Trevo", symbol: "🍀", keywords: ["sorte","pequenas alegrias","oportunidade"] },
  { id: 3, name: "O Navio", symbol: "⛵", keywords: ["viagem","mudança","distância"] },
  { id: 4, name: "A Casa", symbol: "🏠", keywords: ["lar","família","segurança"] },
  { id: 5, name: "A Árvore", symbol: "🌳", keywords: ["saúde","crescimento","vitalidade"] },
  { id: 6, name: "As Nuvens", symbol: "☁️", keywords: ["confusão","incerteza","obstáculo"] },
  { id: 7, name: "A Serpente", symbol: "🐍", keywords: ["traição","sabedoria","inveja"] },
  { id: 8, name: "O Caixão", symbol: "⚰️", keywords: ["fim","transformação","encerramento"] },
  { id: 9, name: "O Buquê", symbol: "💐", keywords: ["felicidade","presente","amizade"] },
  { id: 10, name: "A Foice", symbol: "⚔️", keywords: ["corte","decisão","separação"] },
  { id: 11, name: "O Açoite", symbol: "⚡", keywords: ["conflito","advertência","tensão"] },
  { id: 12, name: "Os Pássaros", symbol: "🕊️", keywords: ["comunicação","fofoca","conversa"] },
  { id: 13, name: "A Criança", symbol: "👶", keywords: ["novidade","inocência","começo"] },
  { id: 14, name: "A Raposa", symbol: "🦊", keywords: ["astúcia","trapaça","cautela"] },
  { id: 15, name: "O Urso", symbol: "🐻", keywords: ["força","autoridade","proteção"] },
  { id: 16, name: "A Estrela", symbol: "⭐", keywords: ["esperança","destino","guia"] },
  { id: 17, name: "A Cegonha", symbol: "🪹", keywords: ["mudança","renovação","transformação"] },
  { id: 18, name: "O Cachorro", symbol: "🐕", keywords: ["amizade","lealdade","fidelidade"] },
  { id: 19, name: "A Torre", symbol: "🏰", keywords: ["solidão","isolamento","instituição"] },
  { id: 20, name: "O Jardim", symbol: "🌿", keywords: ["sociedade","natureza","encontros"] },
  { id: 21, name: "A Montanha", symbol: "⛰️", keywords: ["obstáculo","demora","desafio"] },
  { id: 22, name: "Os Caminhos", symbol: "🛤️", keywords: ["escolha","decisão","alternativas"] },
  { id: 23, name: "Os Ratos", symbol: "🐀", keywords: ["perda","roubo","desgaste"] },
  { id: 24, name: "O Coração", symbol: "❤️", keywords: ["amor","sentimento","paixão"] },
  { id: 25, name: "O Anel", symbol: "💍", keywords: ["compromisso","contrato","aliança"] },
  { id: 26, name: "O Livro", symbol: "📖", keywords: ["segredo","conhecimento","mistério"] },
  { id: 27, name: "A Carta", symbol: "✉️", keywords: ["notícia","documento","comunicação"] },
  { id: 28, name: "O Senhor", symbol: "🧔", keywords: ["homem maduro","pai","parceiro"] },
  { id: 29, name: "A Senhora", symbol: "👩", keywords: ["mulher madura","mãe","parceira"] },
  { id: 30, name: "Os Lírios", symbol: "🌸", keywords: ["paz","virtude","maturidade"] },
  { id: 31, name: "O Sol", symbol: "☀️", keywords: ["sucesso","clareza","alegria"] },
  { id: 32, name: "A Lua", symbol: "🌙", keywords: ["emoção","intuição","sonhos"] },
  { id: 33, name: "A Chave", symbol: "🗝️", keywords: ["solução","abertura","destino"] },
  { id: 34, name: "O Peixe", symbol: "🐟", keywords: ["abundância","dinheiro","prosperidade"] },
  { id: 35, name: "A Âncora", symbol: "⚓", keywords: ["estabilidade","persistência","segurança"] },
  { id: 36, name: "A Cruz", symbol: "✝️", keywords: ["karma","destino","fé"] }
];

const CARD_MEANINGS = {
  1: { pos: "Uma novidade se aproxima — uma mensagem, um movimento, algo que chega sem avisar.", neg: "A pressa pode ser traiçoeira. Nem toda notícia que chega é bem-vinda." },
  2: { pos: "A sorte está ao seu lado, mesmo que de formas pequenas.", neg: "Não desperdice as pequenas oportunidades esperando pelas grandes." },
  3: { pos: "Uma viagem, mudança ou transação se anuncia.", neg: "A distância pode estar criando afastamento." },
  4: { pos: "O lar e a família são seu alicerce neste momento.", neg: "Questões domésticas pedem atenção." },
  5: { pos: "A Árvore fala de saúde e crescimento lento.", neg: "A saúde pede cuidado. Não ignore sinais do corpo." },
  6: { pos: "As Nuvens passam — a confusão atual é temporária.", neg: "Há incerteza cobrindo os fatos. Aguarde clareza." },
  7: { pos: "A Serpente traz sabedoria e transformação profunda.", neg: "Cuidado com traição ou inveja ao redor." },
  8: { pos: "O Caixão anuncia o fim de um ciclo necessário.", neg: "Um encerramento doloroso, mas que abre espaço para o novo." },
  9: { pos: "O Buquê traz alegria, presentes e beleza.", neg: "A superficialidade pode estar mascarando questões reais." },
  10: { pos: "A Foice pede decisão. Um corte necessário.", neg: "Perigo de decisões precipitadas ou rupturas abruptas." },
  11: { pos: "O Açoite traz energia intensa e advertência.", neg: "Conflito e discórdia rondam. Evite confrontos." },
  12: { pos: "Os Pássaros falam de conversas e acordos.", neg: "Fofoca e ruídos de comunicação podem distorcer a realidade." },
  13: { pos: "A Criança anuncia um novo começo cheio de potencial.", neg: "Imaturidade ou ingenuidade podem ser obstáculos." },
  14: { pos: "A Raposa pede astúcia e estratégia.", neg: "Desconfie de armadilhas ou desonestidade." },
  15: { pos: "O Urso representa força, autoridade e proteção.", neg: "Excesso de controle ou dominação sufocando a situação." },
  16: { pos: "A Estrela brilha com esperança e destino.", neg: "Idealismo excessivo pode afastar você da realidade." },
  17: { pos: "A Cegonha traz renovação e transformação positiva.", neg: "Mudanças abruptas podem causar instabilidade." },
  18: { pos: "O Cachorro fala de amizade verdadeira e lealdade.", neg: "Cuidado com quem se diz amigo; filtre as lealdades." },
  19: { pos: "A Torre representa independência e clareza.", neg: "Isolamento excessivo ou orgulho impedindo conexões." },
  20: { pos: "O Jardim convida ao social e aos encontros.", neg: "Pressão social drenando sua energia." },
  21: { pos: "A Montanha exige persistência perante o desafio.", neg: "Bloqueios e demoras inevitáveis agora. Tenha paciência." },
  22: { pos: "Os Caminhos anunciam uma escolha importante.", neg: "A indecisão pode ser paralisante agora." },
  23: { pos: "Os Ratos alertam para perdas ou desgastes.", neg: "Algo está sendo consumido silenciosamente. Identifique a fonte." },
  24: { pos: "O Coração fala de amor, sentimento e paixão.", neg: "Feridas emocionais pedem cuidado e cura." },
  25: { pos: "O Anel representa compromisso e alianças.", neg: "Um vínculo pode estar aprisionando em vez de nutrir." },
  26: { pos: "O Livro guarda segredos e conhecimento oculto.", neg: "Algo ainda não foi dito; um mistério influencia os fatos." },
  27: { pos: "A Carta anuncia notícias e informações relevantes.", neg: "Uma notícia inesperada pode trazer complicações temporárias." },
  28: { pos: "O Senhor representa razão e autoridade masculina.", neg: "Rigidez ou influência negativa de uma figura de poder." },
  29: { pos: "A Senhora representa intuição e sabedoria emocional.", neg: "Excesso de emoção nublando o julgamento." },
  30: { pos: "Os Lírios trazem paz, virtude e harmonia.", neg: "Paz superficial escondendo tensões não resolvidas." },
  31: { pos: "O Sol ilumina tudo com sucesso e clareza.", neg: "Vaidade excessiva pode ofuscar o que importa." },
  32: { pos: "A Lua fala de sonhos e intuição profunda.", neg: "Ilusões e medos distorcendo a percepção real." },
  33: { pos: "A Chave revela a solução e a abertura necessária.", neg: "Uma porta se fecha; aceite para encontrar outra saída." },
  34: { pos: "O Peixe traz abundância e fluxo financeiro.", neg: "Gastos excessivos comprometendo a estabilidade." },
  35: { pos: "A Âncora garante estabilidade e segurança.", neg: "O porto seguro pode estar se tornando um aprisionamento." },
  36: { pos: "A Cruz fala de karma e lições de destino.", neg: "Uma provação existe. Enfrente-a com fé." }
};

let currentSpread = null;
let drawnCards = [];
let remaining = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function selectSpread(count, name, positions) {
  currentSpread = { count, name, positions };
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);
  
  showScreen('screen-spread');
  renderSlots();
  updatePileCounter();
  
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('card-pile').style.opacity = '1';
  document.getElementById('card-pile').style.pointerEvents = 'auto';
}

function renderSlots() {
  const area = document.getElementById('slots-area');
  area.innerHTML = '';
  for (let i = 0; i < currentSpread.count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `<div style="font-size:0.6rem; color:var(--text-dim)">${currentSpread.positions[i]}</div>`;
    area.appendChild(slot);
  }
}

function drawCard() {
  if (drawnCards.length >= currentSpread.count) return;

  const card = remaining.pop();
  const idx = drawnCards.length;
  drawnCards.push(card);

  const slot = document.getElementById(`slot-${idx}`);
  slot.innerHTML = `
    <div class="playing-card">
      <div style="font-size:1.6rem">${card.symbol}</div>
      <div style="font-size:0.5rem; color:var(--gold); text-transform:uppercase">${card.name}</div>
    </div>
  `;

  updatePileCounter();

  if (drawnCards.length === currentSpread.count) {
    document.getElementById('card-pile').style.opacity = '0.3';
    document.getElementById('card-pile').style.pointerEvents = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
  }
}

function updatePileCounter() {
  document.getElementById('pile-counter').textContent = `${drawnCards.length} de ${currentSpread.count} selecionadas`;
}

function goToReading() {
  showScreen('screen-reading');
  document.getElementById('reading-title').textContent = currentSpread.name;
  
  const container = document.getElementById('cards-revealed');
  container.innerHTML = '';
  
  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'card-slot';
    div.innerHTML = `
      <div class="playing-card"><span>${card.symbol}</span></div>
      <div style="font-size:0.6rem; margin-top:5px; color:var(--gold)">${currentSpread.positions[i]}</div>
      <div style="font-size:0.7rem; font-weight:bold">${card.name}</div>
    `;
    container.appendChild(div);
  });

  generateInterpretation();
}

function generateInterpretation() {
  const box = document.getElementById('interpretation-box');
  const positiveIds = new Set([1,2,3,4,5,9,13,15,16,17,18,20,24,25,30,31,33,34,35]);
  
  let html = "<h3>✦ A LEITURA DAS CARTAS</h3>";
  
  drawnCards.forEach((card, i) => {
    const tone = positiveIds.has(card.id) ? 'pos' : 'neg';
    html += `<p style="margin-bottom:15px; line-height:1.6;"><b>${currentSpread.positions[i]}:</b> ${CARD_MEANINGS[card.id][tone]}</p>`;
  });

  const keywords = drawnCards.flatMap(c => c.keywords).slice(0, 10).map(k => `<span class="keyword-pill">${k}</span>`).join('');
  html += `<div style="margin-top:20px;">${keywords}</div>`;
  
  box.innerHTML = html;
}

function resetAll() {
  showScreen('screen-options');
}

</script>
</body>
</html>
