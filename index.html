<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Cigano</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1e;
    --deep: #0a0608;
    --card-border: #6b4c1e;
    --text: #e8d5a3;
    --text-dim: #9e8a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow-x: hidden;
    /* Remove atraso de clique no mobile e evita conflitos no Vivaldi/Mozilla */
    touch-action: manipulation; 
  }

  /* Fundo de Estrelas */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 50%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 20%, rgba(201,168,76,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  header { text-align: center; padding: 32px 0 20px; }
  h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(1.4rem, 5vw, 2.4rem); color: var(--gold-light); text-shadow: 0 0 30px rgba(201,168,76,0.4); }
  .divider { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; opacity: 0.6; }

  /* Telas */
  .screen { display: none; animation: fadeIn 0.6s ease forwards; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Grid de Opções */
  .spread-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .spread-btn {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    color: var(--text);
    text-align: center;
    transition: 0.3s;
  }
  .spread-btn:hover { border-color: var(--gold); background: #1a0f05; }

  /* Área das Cartas */
  .slots-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .card-slot { width: 90px; height: 130px; border: 2px dashed rgba(201,168,76,0.25); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  
  .playing-card {
    width: 86px; height: 126px; background: linear-gradient(145deg, #1f1108, #0d0703);
    border: 1px solid var(--gold); border-radius: 7px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: cardReveal 0.5s ease;
  }
  @keyframes cardReveal { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }

  .card-pile { width: 90px; height: 130px; margin: 0 auto 20px; cursor: pointer; position: relative; }
  .pile-layer { position: absolute; inset: 0; background: linear-gradient(145deg, #2a1a0a, #1a0f05); border: 1px solid var(--card-border); border-radius: 8px; box-shadow: 0 0 15px rgba(201,168,76,0.2); }
  .pile-layer::after { content: '🔮'; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 2rem; }

  /* Leitura */
  .interpretation { background: rgba(20, 10, 5, 0.9); border-left: 3px solid var(--gold); padding: 28px; border-radius: 0 10px 10px 0; margin-top: 20px; line-height: 1.8; }
  .interpretation h3 { font-family: 'Cinzel Decorative'; color: var(--gold); margin-bottom: 15px; font-size: 0.9rem; }
  .keyword-pill { display: inline-block; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; margin: 3px; color: var(--gold-light); }

  .btn-primary { width: 100%; padding: 16px; background: var(--gold-dark); border: none; font-family: 'Cinzel Decorative'; font-weight: bold; border-radius: 6px; cursor: pointer; color: #000; margin-top: 20px; }

  @media(max-width: 500px) {
    .card-slot { width: 80px; height: 115px; }
    .playing-card { width: 76px; height: 110px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Baralho Cigano</h1>
    <div class="divider"></div>
  </header>

  <div id="screen-question" class="screen active">
    <div class="spread-options">
      <button class="spread-btn" onclick="selectSpread(1, 'Carta do Momento', ['O Presente'])">
        <b>CARTA DO MOMENTO</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(3, 'Passado, Presente e Futuro', ['Passado','Presente','Futuro'])">
        <b>TRÊS TEMPOS</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(5, 'Cruz Cigana', ['Situação','Desafio','Passado','Futuro','Desfecho'])">
        <b>CRUZ CIGANA</b>
      </button>
    </div>
  </div>

  <div id="screen-spread" class="screen">
    <div class="slots-area" id="slots-area"></div>
    <div class="card-pile" id="card-pile" onclick="drawCard()">
      <div class="pile-layer"></div>
    </div>
    <p id="pile-counter" style="text-align:center; font-size:0.8rem; color:var(--text-dim)"></p>
    <button class="btn-primary" id="reveal-btn" style="display:none" onclick="goToReading()">✦ REVELAR LEITURA</button>
  </div>

  <div id="screen-reading" class="screen">
    <h2 id="reading-title" style="text-align:center; color:var(--gold-light); margin-bottom:20px; font-family:'Cinzel Decorative'"></h2>
    <div class="slots-area" id="cards-revealed"></div>
    <div class="interpretation" id="interpretation-box"></div>
    <button class="btn-primary" onclick="resetAll()" style="background:transparent; border:1px solid var(--gold); color:var(--gold)">NOVA TIRAGEM</button>
  </div>
</div>

<script>
const CARDS = [
  { id: 1, name: "O Cavaleiro", symbol: "🐴", keywords: ["novidade","mensagem","movimento"] },
  { id: 2, name: "O Trevo", symbol: "🍀", keywords: ["sorte","alegria","oportunidade"] },
  { id: 3, name: "O Navio", symbol: "⛵", keywords: ["viagem","mudança","distância"] },
  { id: 4, name: "A Casa", symbol: "🏠", keywords: ["lar","família","segurança"] },
  { id: 5, name: "A Árvore", symbol: "🌳", keywords: ["saúde","crescimento","vitalidade"] },
  { id: 6, name: "As Nuvens", symbol: "☁️", keywords: ["confusão","incerteza","obstáculo"] },
  { id: 7, name: "A Serpente", symbol: "🐍", keywords: ["sabedoria","traição","inveja"] },
  { id: 8, name: "O Caixão", symbol: "⚰️", keywords: ["fim","transformação","encerramento"] },
  { id: 9, name: "O Buquê", symbol: "💐", keywords: ["felicidade","presente","beleza"] },
  { id: 10, name: "A Foice", symbol: "⚔️", keywords: ["corte","decisão","perigo"] },
  { id: 11, name: "O Açoite", symbol: "⚡", keywords: ["conflito","tensão","energia"] },
  { id: 12, name: "Os Pássaros", symbol: "🕊️", keywords: ["conversa","comunicação","fofoca"] },
  { id: 13, name: "A Criança", symbol: "👶", keywords: ["início","inocência","novidade"] },
  { id: 14, name: "A Raposa", symbol: "🦊", keywords: ["astúcia","estratégia","cautela"] },
  { id: 15, name: "O Urso", symbol: "🐻", keywords: ["força","proteção","poder"] },
  { id: 16, name: "A Estrela", symbol: "⭐", keywords: ["esperança","guia","brilho"] },
  { id: 17, name: "A Cegonha", symbol: "🪹", keywords: ["mudança","renovação","surpresa"] },
  { id: 18, name: "O Cachorro", symbol: "🐕", keywords: ["lealdade","amizade","confiança"] },
  { id: 19, name: "A Torre", symbol: "🏰", keywords: ["isolamento","elevação","espiritualidade"] },
  { id: 20, name: "O Jardim", symbol: "🌿", keywords: ["social","encontros","lazer"] },
  { id: 21, name: "A Montanha", symbol: "⛰️", keywords: ["desafio","obstáculo","firmeza"] },
  { id: 22, name: "Os Caminhos", symbol: "🛤️", keywords: ["escolha","direção","decisão"] },
  { id: 23, name: "Os Ratos", symbol: "🐀", keywords: ["desgaste","perda","preocupação"] },
  { id: 24, name: "O Coração", symbol: "❤️", keywords: ["amor","emoção","sentimento"] },
  { id: 25, name: "O Anel", symbol: "💍", keywords: ["união","contrato","aliança"] },
  { id: 26, name: "O Livro", symbol: "📖", keywords: ["estudo","segredo","conhecimento"] },
  { id: 27, name: "A Carta", symbol: "✉️", keywords: ["mensagem","documento","aviso"] },
  { id: 28, name: "O Cigano", symbol: "🧔", keywords: ["ação","racionalidade","figura masculina"] },
  { id: 29, name: "A Cigana", symbol: "👩", keywords: ["emoção","intuição","figura feminina"] },
  { id: 30, name: "Os Lírios", symbol: "🌸", keywords: ["paz","pureza","maturidade"] },
  { id: 31, name: "O Sol", symbol: "☀️", keywords: ["sucesso","vitalidade","clareza"] },
  { id: 32, name: "A Lua", symbol: "🌙", keywords: ["sonhos","reconhecimento","mistério"] },
  { id: 33, name: "A Chave", symbol: "🗝️", keywords: ["solução","abertura","saída"] },
  { id: 34, name: "Os Peixes", symbol: "🐟", keywords: ["dinheiro","abundância","prosperidade"] },
  { id: 35, name: "A Âncora", symbol: "⚓", keywords: ["estabilidade","segurança","foco"] },
  { id: 36, name: "A Cruz", symbol: "✝️", keywords: ["fé","provação","destino"] }
];

const CARD_MEANINGS = {
  1: { pos: "Novidades e mensagens rápidas estão chegando.", neg: "Atenção com a impulsividade." },
  2: { pos: "Pequenas sortes e alegrias inesperadas.", neg: "Dificuldades que exigem otimismo." },
  3: { pos: "Mudanças e novos horizontes se abrem.", neg: "Sentimento de distância ou saudade." },
  4: { pos: "Segurança e apoio vindo da família.", neg: "Instabilidade no ambiente doméstico." },
  5: { pos: "Saúde e vitalidade em crescimento.", neg: "Cuidado com o corpo; estagnação." },
  6: { pos: "A confusão mental vai passar em breve.", neg: "Incertezas que bloqueiam a visão." },
  7: { pos: "Sabedoria e regeneração estratégica.", neg: "Atenção com falsidades ao redor." },
  8: { pos: "Encerramento de ciclo para o novo surgir.", neg: "Perda ou dificuldade em aceitar o fim." },
  9: { pos: "Momento de beleza, alegria e presentes.", neg: "Felicidade passageira ou superficial." },
  10: { pos: "Corte necessário e decisão definitiva.", neg: "Ruptura brusca ou perigo iminente." },
  24: { pos: "Amor profundo e harmonia emocional.", neg: "Instabilidade nos sentimentos." },
  31: { pos: "Sucesso pleno, luz e clareza total.", neg: "Excesso de exposição ou vaidade." }
  // Adicione os outros significados aqui...
};

let currentSpread = null;
let drawnCards = [];
let remaining = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function selectSpread(count, name, positions) {
  currentSpread = { count, name, positions };
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);
  showScreen('screen-spread');
  
  const area = document.getElementById('slots-area');
  area.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `<span style="font-size:0.6rem; color:var(--text-dim)">${positions[i]}</span>`;
    area.appendChild(slot);
  }
  updatePileCounter();
  document.getElementById('card-pile').style.display = 'block';
  document.getElementById('reveal-btn').style.display = 'none';
}

function drawCard() {
  if (drawnCards.length >= currentSpread.count) return;

  const card = remaining.pop();
  const idx = drawnCards.length;
  drawnCards.push(card);

  const slot = document.getElementById(`slot-${idx}`);
  slot.innerHTML = `
    <div class="playing-card">
      <div style="font-size:1.8rem">${card.symbol}</div>
      <div style="font-size:0.6rem; color:var(--gold); font-weight:bold; text-align:center">${card.name}</div>
    </div>
  `;

  updatePileCounter();

  if (drawnCards.length === currentSpread.count) {
    document.getElementById('card-pile').style.display = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
  }
}

function updatePileCounter() {
  document.getElementById('pile-counter').textContent = `${drawnCards.length} de ${currentSpread.count} cartas`;
}

function goToReading() {
  showScreen('screen-reading');
  document.getElementById('reading-title').textContent = currentSpread.name;
  
  const container = document.getElementById('cards-revealed');
  container.innerHTML = '';
  
  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'card-slot';
    div.style.height = 'auto';
    div.innerHTML = `
      <div class="playing-card"><span>${card.symbol}</span></div>
      <div style="font-size:0.7rem; color:var(--gold); margin-top:5px"><b>${currentSpread.positions[i]}</b></div>
      <div style="font-size:0.7rem">${card.name}</div>
    `;
    container.appendChild(div);
  });

  generateReading();
}

function generateReading() {
  const box = document.getElementById('interpretation-box');
  const posSet = new Set([1,2,3,4,5,9,13,15,16,18,24,25,30,31,33,34,35]);
  
  let html = "<h3>✦ INTERPRETAÇÃO DAS CARTAS</h3>";
  drawnCards.forEach((card, i) => {
    const tone = posSet.has(card.id) ? 'pos' : 'neg';
    const desc = CARD_MEANINGS[card.id] ? CARD_MEANINGS[card.id][tone] : "Energias em movimento.";
    html += `<p style="margin-bottom:15px"><b>${currentSpread.positions[i]}:</b> ${desc}</p>`;
  });

  const kws = drawnCards.flatMap(c => c.keywords).slice(0, 10).map(k => `<span class="keyword-pill">${k}</span>`).join('');
  html += `<div style="margin-top:20px">${kws}</div>`;
  box.innerHTML = html;
}

function resetAll() {
  showScreen('screen-question');
}
</script>
</body>
</html>
