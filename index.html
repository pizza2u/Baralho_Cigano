<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Cigano</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1e;
    --crimson: #8b1a1a;
    --deep: #0a0608;
    --card-bg: #1a0f0a;
    --card-border: #6b4c1e;
    --text: #e8d5a3;
    --text-dim: #9e8a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  /* EFEITO DE ESTRELAS */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
                      radial-gradient(1px 1px at 55% 75%, rgba(201,168,76,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  header { text-align: center; padding: 32px 0 20px; }
  h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(1.4rem, 5vw, 2.4rem); color: var(--gold-light); text-shadow: 0 0 20px rgba(201,168,76,0.4); }

  /* TELAS */
  .screen { display: none; animation: fadeIn 0.6s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* BOTÕES DE TIRAGEM */
  .spread-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 24px; }
  .spread-btn {
    background: linear-gradient(135deg, #1e1208, #0f0a05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    color: var(--text);
    text-align: center;
  }

  /* BARALHO E SLOTS */
  .slots-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
  .card-slot { width: 90px; height: 130px; border: 2px dashed rgba(201,168,76,0.25); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

  .playing-card {
    width: 86px; height: 126px;
    background: linear-gradient(145deg, #1f1108, #0d0703);
    border: 1px solid var(--gold);
    border-radius: 7px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: cardReveal 0.4s ease-out;
  }

  .card-pile { width: 90px; height: 130px; margin: 20px auto; position: relative; cursor: pointer; animation: glow-pulse 3s infinite; }
  .pile-layer { position: absolute; inset: 0; background: linear-gradient(145deg, #2a1a0a, #1a0f05); border: 1px solid var(--card-border); border-radius: 8px; }
  .pile-layer::after { content: '🔮'; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 2rem; }

  /* INTERPRETAÇÃO */
  .interpretation { background: linear-gradient(135deg, #1a100a, #0d0806); border-left: 3px solid var(--gold); padding: 24px; margin-top: 20px; border-radius: 0 10px 10px 0; line-height: 1.8; }
  .interpretation h3 { font-family: 'Cinzel Decorative'; font-size: 0.9rem; color: var(--gold); margin-bottom: 12px; }
  .interpretation p { margin-bottom: 15px; font-style: italic; }

  .keyword-pill { display: inline-block; background: rgba(201,168,76,0.1); padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; margin: 4px; border: 1px solid rgba(201,168,76,0.2); color: var(--gold-light); }

  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); border: none; color: #000; font-family: 'Cinzel Decorative'; font-weight: bold; border-radius: 6px; margin-top: 20px; cursor: pointer; }

  @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 10px rgba(201,168,76,0.2); } 50% { box-shadow: 0 0 25px rgba(201,168,76,0.4); } }
  @keyframes cardReveal { from { transform: scale(0.8) rotateY(90deg); opacity: 0; } to { transform: scale(1) rotateY(0); opacity: 1; } }

  @media(max-width: 500px) {
    .card-slot { width: 80px; height: 115px; }
    .playing-card { width: 76px; height: 110px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Baralho Cigano</h1>
    <p style="color:var(--text-dim)">As cartas falam — os astros guiam</p>
  </header>

  <div id="screen-question" class="screen active">
    <div class="spread-options">
      <button class="spread-btn" onclick="selectSpread(1, 'Carta do Momento', ['O Presente'])">
        <span style="font-size:1.5rem">🕯️</span><br><b>Carta do Momento</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(3, 'Passado, Presente e Futuro', ['O Passado','O Presente','O Futuro'])">
        <span style="font-size:1.5rem">⏳</span><br><b>Três Tempos</b>
      </button>
      <button class="spread-btn" onclick="selectSpread(5, 'Cruz Cigana', ['Situação','Desafio','Passado','Futuro','Desfecho'])">
        <span style="font-size:1.5rem">✡️</span><br><b>Cruz Cigana</b>
      </button>
    </div>
  </div>

  <div id="screen-spread" class="screen">
    <div class="slots-area" id="slots-area"></div>
    <div class="card-pile" id="card-pile" onclick="drawCard()">
      <div class="pile-layer"></div>
    </div>
    <p id="pile-counter" style="text-align:center; font-size:0.8rem; color:var(--text-dim)"></p>
    <button class="btn-primary" id="reveal-btn" style="display:none" onclick="goToReading()">✦ REVELAR LEITURA</button>
  </div>

  <div id="screen-reading" class="screen">
    <h2 id="reading-title" style="text-align:center; color:var(--gold); font-family:'Cinzel Decorative'; margin-bottom:20px;"></h2>
    <div class="slots-area" id="cards-revealed"></div>
    <div class="interpretation" id="interpretation-box">
      <p>As cartas sussurram seus segredos...</p>
    </div>
    <button class="btn-primary" onclick="resetAll()" style="background:transparent; border:1px solid var(--gold); color:var(--gold)">NOVA TIRAGEM</button>
  </div>
</div>

<script>
// --- BANCO DE DADOS COMPLETO ---
const CARDS = [
  { id: 1, name: "O Cavaleiro", symbol: "🐴", keywords: ["novidade","mensagem","movimento"] },
  { id: 2, name: "O Trevo", symbol: "🍀", keywords: ["sorte","pequenas alegrias","oportunidade"] },
  { id: 3, name: "O Navio", symbol: "⛵", keywords: ["viagem","mudança","distância"] },
  { id: 4, name: "A Casa", symbol: "🏠", keywords: ["lar","família","estabilidade"] },
  { id: 5, name: "A Árvore", symbol: "🌳", keywords: ["saúde","crescimento","vitalidade"] },
  { id: 6, name: "As Nuvens", symbol: "☁️", keywords: ["confusão","incerteza","obstáculo"] },
  { id: 7, name: "A Serpente", symbol: "🐍", keywords: ["traição","sabedoria","inveja"] },
  { id: 8, name: "O Caixão", symbol: "⚰️", keywords: ["fim","transformação","luto"] },
  { id: 9, name: "O Buquê", symbol: "💐", keywords: ["felicidade","presente","beleza"] },
  { id: 10, name: "A Foice", symbol: "⚔️", keywords: ["corte","decisão","perigo"] },
  { id: 11, name: "O Açoite", symbol: "⚡", keywords: ["conflito","advertência","tensão"] },
  { id: 12, name: "Os Pássaros", symbol: "🕊️", keywords: ["comunicação","fofoca","conversa"] },
  { id: 13, name: "A Criança", symbol: "👶", keywords: ["novidade","inocência","começo"] },
  { id: 14, name: "A Raposa", symbol: "🦊", keywords: ["astúcia","trapaça","cautela"] },
  { id: 15, name: "O Urso", symbol: "🐻", keywords: ["força","autoridade","poder"] },
  { id: 16, name: "A Estrela", symbol: "⭐", keywords: ["esperança","destino","inspiração"] },
  { id: 17, name: "A Cegonha", symbol: "🪹", keywords: ["mudança","renovação","novidade"] },
  { id: 18, name: "O Cachorro", symbol: "🐕", keywords: ["amizade","lealdade","fidelidade"] },
  { id: 19, name: "A Torre", symbol: "🏰", keywords: ["solidão","isolamento","orgulho"] },
  { id: 20, name: "O Jardim", symbol: "🌿", keywords: ["sociedade","eventos","natureza"] },
  { id: 21, name: "A Montanha", symbol: "⛰️", keywords: ["obstáculo","demora","desafio"] },
  { id: 22, name: "Os Caminhos", symbol: "🛤️", keywords: ["escolha","decisão","alternativas"] },
  { id: 23, name: "Os Ratos", symbol: "🐀", keywords: ["perda","roubo","desgaste"] },
  { id: 24, name: "O Coração", symbol: "❤️", keywords: ["amor","sentimento","paixão"] },
  { id: 25, name: "O Anel", symbol: "💍", keywords: ["compromisso","contrato","aliança"] },
  { id: 26, name: "O Livro", symbol: "📖", keywords: ["segredo","conhecimento","mistério"] },
  { id: 27, name: "A Carta", symbol: "✉️", keywords: ["notícia","documento","informação"] },
  { id: 28, name: "O Senhor", symbol: "🧔", keywords: ["homem maduro","pai","parceiro"] },
  { id: 29, name: "A Senhora", symbol: "👩", keywords: ["mulher madura","mãe","parceira"] },
  { id: 30, name: "Os Lírios", symbol: "🌸", keywords: ["paz","virtude","maturidade"] },
  { id: 31, name: "O Sol", symbol: "☀️", keywords: ["sucesso","clareza","alegria"] },
  { id: 32, name: "A Lua", symbol: "🌙", keywords: ["emoção","intuição","sonhos"] },
  { id: 33, name: "A Chave", symbol: "🗝️", keywords: ["solução","abertura","destino"] },
  { id: 34, name: "O Peixe", symbol: "🐟", keywords: ["abundância","dinheiro","prosperidade"] },
  { id: 35, name: "A Âncora", symbol: "⚓", keywords: ["estabilidade","segurança","firmeza"] },
  { id: 36, name: "A Cruz", symbol: "✝️", keywords: ["karma","destino","fé"] }
];

const CARD_MEANINGS = {
  1: { pos: "Uma novidade se aproxima — uma mensagem ou movimento rápido.", neg: "A pressa pode ser traiçoeira; avalie as notícias com calma." },
  2: { pos: "A sorte está ao seu lado em pequenas formas discretas.", neg: "Não desperdice as pequenas alegrias esperando algo gigante." },
  3: { pos: "Uma mudança ou viagem se anuncia no horizonte.", neg: "A distância pode estar criando um afastamento desnecessário." },
  4: { pos: "O lar e a família trazem a segurança necessária agora.", neg: "Algo no ambiente doméstico precisa de cuidado e atenção." },
  5: { pos: "Crescimento lento e vitalidade. Suas raízes estão fortes.", neg: "Não ignore sinais de cansaço ou problemas de saúde." },
  6: { pos: "A confusão é passageira. Aguarde a névoa baixar.", neg: "Há incerteza cobrindo os fatos; desconfie das aparências." },
  7: { pos: "A Serpente traz sabedoria e renovação profunda.", neg: "Cuidado com pessoas mal-intencionadas ou fofocas ao redor." },
  8: { pos: "Um ciclo se encerra para que o novo possa nascer.", neg: "Um encerramento difícil, mas necessário para sua evolução." },
  9: { pos: "Um momento de celebração, presentes e beleza.", neg: "Cuidado com a superficialidade que esconde o real." },
  10: { pos: "Hora de tomar uma decisão clara e fazer cortes.", neg: "Perigo de rupturas bruscas e impensadas. Reflita." },
  11: { pos: "Energia intensa e necessidade de disciplina.", neg: "Tensões e conflitos que podem ser evitados com calma." },
  12: { pos: "Conversas e parcerias trazem bons frutos.", neg: "Fofocas e ruídos de comunicação podem atrapalhar." },
  13: { pos: "Um novo começo cheio de pureza e potencial.", neg: "Imaturidade ou ingenuidade diante de um problema." },
  14: { pos: "Use a inteligência e a estratégia a seu favor.", neg: "Cuidado com armadilhas ou desonestidade de terceiros." },
  15: { pos: "Você tem a proteção e a força de alguém poderoso.", neg: "Excesso de controle ou ciúmes sufocando a situação." },
  16: { pos: "Siga sua intuição; o destino está iluminado.", neg: "Cuidado para não viver apenas de sonhos sem ação." },
  17: { pos: "Novidades e mudanças positivas estão chegando.", neg: "Instabilidade causada por mudanças sem planejamento." },
  18: { pos: "Conte com a lealdade de amigos verdadeiros.", neg: "Confiança depositada na pessoa errada; fique alerta." },
  19: { pos: "Busque sua força interior e independência.", neg: "Isolamento excessivo ou solidão não desejada." },
  20: { pos: "Oportunidades em eventos sociais e na natureza.", neg: "Pressão social ou superexposição desgastante." },
  21: { pos: "Persistência é a chave para vencer este desafio.", neg: "Bloqueios que parecem intransponíveis no momento." },
  22: { pos: "Vários caminhos se abrem; escolha com sabedoria.", neg: "A indecisão está travando seu progresso atual." },
  23: { pos: "Identifique o que está sugando sua energia.", neg: "Perdas financeiras ou desgaste emocional severo." },
  24: { pos: "O amor e a paixão guiam seus passos hoje.", neg: "Sentimentos confusos ou feridas emocionais abertas." },
  25: { pos: "Alianças e contratos sólidos se fortalecem.", neg: "Um vínculo que prende mais do que liberta. Reavalie." },
  26: { pos: "Conhecimento e segredos serão revelados no tempo certo.", neg: "Algo importante está sendo escondido de você." },
  27: { pos: "Notícias por escrito ou documentos importantes chegam.", neg: "Informações truncadas ou papéis atrasados causando estresse." },
  28: { pos: "Presença masculina forte ou foco na razão e ação.", neg: "Rigidez excessiva ou conflito com figura de autoridade." },
  29: { pos: "Foco na intuição, no cuidado e na receptividade.", neg: "Instabilidade emocional afetando o julgamento." },
  30: { pos: "Paz, maturidade e harmonia em seus dias.", neg: "Uma tranquilidade falsa que esconde problemas antigos." },
  31: { pos: "Sucesso pleno e clareza total sobre o que fazer.", neg: "Sucesso que sobe à cabeça ou excesso de vaidade." },
  32: { pos: "Sua intuição está aguçada; ouça seus sonhos.", neg: "Ilusões e medos infundados distorcendo a realidade." },
  33: { pos: "A solução para o seu problema está em suas mãos.", neg: "Uma porta que se fecha; aceite e procure outra saída." },
  34: { pos: "Abundância e prosperidade fluindo para você.", neg: "Gastos impulsivos ou problemas com fluxo de caixa." },
  35: { pos: "Segurança e estabilidade garantidas no que faz.", neg: "O porto seguro tornou-se uma prisão por medo de mudar." },
  36: { pos: "O destino se cumpre; tenha fé na sua jornada.", neg: "Uma provação difícil que exige resiliência máxima." }
};

// --- LÓGICA DO APP ---
let currentSpread = null;
let drawnCards = [];
let remaining = [];

function selectSpread(count, name, positions) {
  currentSpread = { count, name, positions };
  drawnCards = [];
  remaining = [...CARDS].sort(() => Math.random() - 0.5);
  
  showScreen('screen-spread');
  renderSlots();
  updatePileCounter();
  
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('card-pile').style.display = 'block';
}

function renderSlots() {
  const area = document.getElementById('slots-area');
  area.innerHTML = '';
  for (let i = 0; i < currentSpread.count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `<span style="font-size:0.6rem">${currentSpread.positions[i]}</span>`;
    area.appendChild(slot);
  }
}

function drawCard() {
  if (drawnCards.length >= currentSpread.count) return;

  const card = remaining.pop();
  const idx = drawnCards.length;
  drawnCards.push(card);

  const slot = document.getElementById(`slot-${idx}`);
  slot.innerHTML = `
    <div class="playing-card">
      <div style="font-size:1.8rem">${card.symbol}</div>
      <div style="font-size:0.5rem; color:var(--gold); text-transform:uppercase">${card.name}</div>
    </div>
  `;

  updatePileCounter();

  if (drawnCards.length === currentSpread.count) {
    document.getElementById('card-pile').style.display = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
  }
}

function updatePileCounter() {
  document.getElementById('pile-counter').textContent = `${drawnCards.length} de ${currentSpread.count} cartas`;
}

function goToReading() {
  showScreen('screen-reading');
  document.getElementById('reading-title').textContent = `✦ ${currentSpread.name} ✦`;
  
  const container = document.getElementById('cards-revealed');
  container.innerHTML = '';
  
  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'card-slot';
    div.style.height = 'auto';
    div.innerHTML = `
      <div class="playing-card"><span>${card.symbol}</span></div>
      <div style="font-size:0.6rem; color:var(--text-dim); margin-top:5px;">${currentSpread.positions[i]}</div>
      <div style="font-size:0.7rem; color:var(--gold); font-weight:bold;">${card.name}</div>
    `;
    container.appendChild(div);
  });

  generateInterpretation();
}

function generateInterpretation() {
  const box = document.getElementById('interpretation-box');
  const positiveIds = new Set([2,4,5,9,12,13,15,16,17,18,20,24,25,30,31,33,34,35]);
  
  let html = "<h3>✦ A LEITURA DAS CARTAS</h3>";
  
  drawnCards.forEach((card, i) => {
    const tone = positiveIds.has(card.id) ? 'pos' : 'neg';
    const text = CARD_MEANINGS[card.id][tone];
    
    html += `<p><b>${currentSpread.positions[i]} (${card.name}):</b> ${text}</p>`;
  });

  const keywords = drawnCards.flatMap(c => c.keywords).slice(0, 8).map(k => `<span class="keyword-pill">${k}</span>`).join('');
  html += `<div style="margin-top:20px;">${keywords}</div>`;
  
  box.innerHTML = html;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function resetAll() {
  showScreen('screen-question');
}
</script>
</body>
</html>
